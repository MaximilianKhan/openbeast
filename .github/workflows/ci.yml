name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only reads the repo.
permissions:
  contents: read

# A force-push or rapid PR update cancels the superseded run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install -q -U pip pytest
          python -m pip install -q -r agents/requirements.txt

      - name: Script structure tests
        run: bash tests/test_scripts.sh

      - name: Tool unit tests
        env:
          # No outbound network assumptions in CI (httpbin flakiness);
          # SearXNG/llama-server are likewise not required by these tests.
          OPENBEAST_SKIP_NETWORK_TESTS: "1"
        run: python -m pytest tests/test_tools.py -q

      - name: Full pytest suite
        env:
          OPENBEAST_SKIP_NETWORK_TESTS: "1"
        run: python -m pytest tests/ -q

      # Docs must cite the generated suite counts — kills the hand-written
      # "313 / 323 / 223 units" drift class at the PR gate.
      - name: Doc-drift check (suite counts)
        run: python evals/suite_stats.py --check

      - name: Variant spec audit
        run: python tests/audit_variants.py

      - name: Shell syntax sweep
        run: |
          rc=0
          for f in bootstrap.sh start.sh stop.sh agent.sh scripts/*.sh scripts/lib/*.sh tests/*.sh; do
            bash -n "$f" || { echo "SYNTAX FAIL: $f"; rc=1; }
          done
          exit $rc
