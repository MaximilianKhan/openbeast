use_default_settings: true

server:
  # The real session-signing key is injected per-install via the SEARXNG_SECRET
  # env var (docker-compose.yml requires it; scripts/lib/conf.sh generates it
  # into openbeast.conf). This placeholder must never be a usable key — a value
  # committed here would be shared by every OpenBeast install on GitHub, and
  # remote-access setups expose SearXNG beyond loopback. "ultrasecretkey" is
  # upstream's refuse-to-start sentinel, so a missing env fails loudly.
  secret_key: "ultrasecretkey"
  # Disable rate limiter so the local MCP server can hit the JSON endpoint freely.
  limiter: false
  image_proxy: true

search:
  # Default image only emits 'html' — we need 'json' so the web_search MCP tool works.
  formats:
    - html
    - json
