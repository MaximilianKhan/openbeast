# Log rotation for OpenBeast's unbounded-growth files.
#
# Install (system logrotate picks it up):
#   sed "s|@REPO@|$(pwd)|;s|@USER@|$USER|" scripts/logrotate-openbeast.conf | sudo tee /etc/logrotate.d/openbeast
#
# Or run ad-hoc without root:
#   sed "s|@REPO@|$(pwd)|;s|@USER@|$USER|" scripts/logrotate-openbeast.conf > /tmp/lr-ob.conf
#   logrotate -s ~/.local/state/logrotate-openbeast.state /tmp/lr-ob.conf

@REPO@/.run/stack.log
@REPO@/.run/tool-audit.jsonl
@REPO@/.run/v4-rerun-sweep.log
{
    su @USER@ @USER@
    weekly
    rotate 8
    size 50M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
