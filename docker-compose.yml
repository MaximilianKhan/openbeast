# Pin the compose project name. Compose otherwise derives it from the
# directory name — when this repo was renamed models/ → openbeast/ the old
# project's containers kept the fixed container_names, and `compose up`
# failed with name conflicts while the data volume silently forked
# (models_open-webui-data vs openbeast_open-webui-data). Pinning makes the
# project immune to future directory renames.
name: openbeast

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    network_mode: host
    environment:
      # Model endpoint. Defaults to llama-server (8080); when the agent-spawn
      # router is enabled (AGENT_ROUTER=true), lib/conf.sh sets OPENBEAST_MODEL_URL
      # to the router port so WebUI chats get reliable background-agent spawning.
      - OPENAI_API_BASE_URL=${OPENBEAST_MODEL_URL:-http://localhost:8080/v1}
      - OPENAI_API_KEY=${OPENBEAST_API_KEY:-not-needed}
      # Auth OFF by default: local-only single-user installs get no login
      # wall and configure-webui.sh auto-configures via the default admin
      # account. scripts/setup-tailscale.sh flips this to true (persisted in
      # openbeast.conf) when the WebUI goes tailnet-wide — that's when a
      # per-user login boundary matters. Resolved by scripts/lib/conf.sh.
      - WEBUI_AUTH=${OPENBEAST_WEBUI_AUTH:-false}
      # Loopback-only by default; Tailscale Serve proxies remote devices in.
      - HOST=${OPENBEAST_BIND:-127.0.0.1}
      - PORT=3000
      # Forward X-OpenWebUI-User-{Id,Name,Email,Role} on outbound model
      # requests so the agent-spawn router (agents/router.py) can gate its
      # spawn path by role — only admins may trigger background agents.
      # Without this, the router sees anonymous turns and (by default)
      # fails open. See docs/RBAC_PLAN.md Phase 2.
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

  searxng:
    image: searxng/searxng
    container_name: searxng
    network_mode: host
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      # Newer SearXNG image runs granian, which reads GRANIAN_PORT (default 8080).
      # BIND_ADDRESS from older uwsgi-based images is ignored. Without this override,
      # granian tries to bind 8080 and clashes with llama-server.
      - GRANIAN_PORT=8888
      - GRANIAN_HOST=${OPENBEAST_BIND:-127.0.0.1}
    volumes:
      # Override default settings.yml to enable JSON format (required by web_search
      # MCP tool) and disable the rate limiter for local use.
      - ./searxng/settings.yml:/etc/searxng/settings.yml:rw
    restart: unless-stopped

volumes:
  open-webui-data:
